name: Build for Windows (CMake)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          arch: 'win64_msvc2019_64'
          # Добавляем модули для QML, так как у тебя есть Main.qml
          modules: 'qtdeclarative qtlanguageserver'

      - name: Setup MSVC (Compiler)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Project
        shell: pwsh
        run: |
          mkdir build
          cd build
          # Ищем где лежит CMakeLists.txt
          $cmakeFile = Get-ChildItem -Path .. -Filter CMakeLists.txt -Recurse | Select-Object -First 1
          $projectDir = Split-Path -Parent $cmakeFile.FullName
          
          # Конфигурируем и собираем
          cmake -G "Visual Studio 17 2022" -A x64 -S $projectDir -B .
          cmake --build . --config Release

      - name: Deployment (Collect DLLs)
        shell: pwsh
        run: |
          # Ищем готовый .exe
          $exeFile = Get-ChildItem -Path . -Filter *.exe -Recurse | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1
          if ($null -eq $exeFile) { throw "EXE файл не найден!" }
          
          # Запускаем windeployqt (обязательно с флагом --qmldir, так как у тебя QML проект)
          $qmlDir = Get-ChildItem -Path .. -Filter *.qml -Recurse | Select-Object -First 1 | ForEach-Object { Split-Path -Parent $_.FullName } | Select-Object -Unique
          windeployqt --release --qmldir $qmlDir $($exeFile.FullName)
          
          $outputDir = Split-Path -Parent $($exeFile.FullName)
          echo "DEPLOY_PATH=$outputDir" >> $env:GITHUB_ENV

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: FATFS-Windows-CMake-Build
          path: ${{ env.DEPLOY_PATH }}
