name: Build for Windows (CMake)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.8.0' # Обновили под требования твоего CMakeLists.txt
          arch: 'win64_msvc2019_64'
          modules: 'qtshadertools' 

      - name: Setup MSVC (Compiler)
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build Project
        shell: pwsh
        run: |
          mkdir build
          cd build
          
          # Находим файл CMakeLists.txt во всех подпапках
          $cmakeFile = Get-ChildItem -Path .. -Filter CMakeLists.txt -Recurse | Select-Object -First 1
          if ($null -eq $cmakeFile) { throw "CMakeLists.txt не найден!" }
          $projectDir = Split-Path -Parent $cmakeFile.FullName
          
          # Конфигурируем проект с указанием пути к установленной Qt
          cmake -G "Visual Studio 17 2022" -A x64 -S $projectDir -B . -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
          
          # Собираем проект в режиме Release
          cmake --build . --config Release

      - name: Deployment (Collect DLLs)
        shell: pwsh
        run: |
          # Ищем скомпилированный файл .exe
          $exeFile = Get-ChildItem -Path . -Filter *.exe -Recurse | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1
          if ($null -eq $exeFile) { throw "EXE файл не найден! Сборка не удалась." }
          
          Write-Host "Найден исполняемый файл: $($exeFile.FullName)"
          
          # Находим папку с QML файлами, чтобы windeployqt подтянул нужные плагины
          $qmlSource = Get-ChildItem -Path .. -Filter *.qml -Recurse | Select-Object -First 1 | ForEach-Object { Split-Path -Parent $_.FullName }
          
          # Собираем все зависимости (.dll) в папку с программой
          if ($null -ne $qmlSource) {
            windeployqt --release --qmldir "$qmlSource" "$($exeFile.FullName)"
          } else {
            windeployqt --release "$($exeFile.FullName)"
          }
          
          # Запоминаем путь к папке для этапа загрузки архива
          $outputDir = Split-Path -Parent $($exeFile.FullName)
          echo "DEPLOY_PATH=$outputDir" >> $env:GITHUB_ENV

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: FATFS-Windows-Ready
          path: ${{ env.DEPLOY_PATH }}
